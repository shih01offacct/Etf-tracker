<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>擔保品 ETF 損益追蹤器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #f5f0e8;
            --bg2:         #ede7d9;
            --surface:     #faf7f2;
            --surface2:    #f0ebe0;
            --border:      #d9d0c0;
            --border-soft: #e8e0d0;
            --text:        #2e2a22;
            --text-muted:  #7a7060;
            --text-dim:    #b0a898;
            --accent:      #5c7a4e;
            --accent-light:#eaf2e6;
            --profit:      #c0392b;
            --loss:        #27724a;
            --warning:     #b07d2a;
            --radius:      10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 36px 16px;
        }
        .page-wrap { max-width: 1060px; margin: 0 auto; }

        header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
        .header-icon {
            width: 46px; height: 46px; background: var(--accent-light);
            border: 1.5px solid #b8d4ae; border-radius: var(--radius);
            display: grid; place-items: center; font-size: 22px;
        }
        header h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.2px; }
        header p  { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

        .summary-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
        .card-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px; }
        .card-value { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; color: var(--text); }
        .card-value.profit { color: var(--profit); }
        .card-value.loss   { color: var(--loss); }

        .panel { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .panel-header {
            padding: 13px 20px; border-bottom: 1.5px solid var(--border-soft);
            font-size: 13px; font-weight: 500; color: var(--text-muted);
            display: flex; align-items: center; gap: 8px; background: var(--surface2);
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead th {
            padding: 11px 14px; text-align: right; color: var(--text-muted);
            font-size: 12px; font-weight: 500; letter-spacing: 0.3px;
            border-bottom: 1.5px solid var(--border-soft); background: var(--surface2); white-space: nowrap;
        }
        thead th:first-child { text-align: left; }
        tbody tr { border-bottom: 1px solid var(--border-soft); transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--bg2); }
        td { padding: 13px 14px; text-align: right; white-space: nowrap; }
        td:first-child { text-align: left; }

        .etf-code { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--accent); }
        .etf-name { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .etf-src  { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

        input[type="number"] {
            width: 96px; padding: 7px 10px; background: var(--bg);
            border: 1.5px solid var(--border); border-radius: 6px; color: var(--text);
            font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: right;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="number"]:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(92,122,78,0.15);
        }
        input[type="number"]::placeholder { color: var(--text-dim); }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .profit-cell  { color: var(--profit); font-weight: 600; }
        .loss-cell    { color: var(--loss);   font-weight: 600; }
        .neutral-cell { color: var(--text-muted); }

        tfoot tr { background: var(--surface2); }
        tfoot td {
            padding: 13px 14px; text-align: right; font-weight: 600;
            border-top: 1.5px solid var(--border);
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
        }
        tfoot td:first-child {
            text-align: left; font-family: 'Noto Sans TC', sans-serif;
            font-size: 13px; color: var(--text-muted);
        }

        .action-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 20px; border-top: 1.5px solid var(--border-soft);
            background: var(--surface2); flex-wrap: wrap;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 9px 18px; border: 1.5px solid transparent; border-radius: 7px;
            font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .btn-primary   { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: #4a6840; border-color: #4a6840; }
        .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
        .btn-secondary:hover { background: var(--bg2); }
        .btn:disabled  { opacity: 0.45; cursor: not-allowed; }

        .status-badge {
            margin-left: auto; font-size: 13px;
            display: flex; align-items: center; gap: 7px; color: var(--text-muted);
        }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
        .status-dot.ok      { background: var(--loss); }
        .status-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
        .status-dot.error   { background: var(--profit); }
        .status-dot.partial { background: var(--warning); }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

        .spinner {
            display: inline-block; width: 13px; height: 13px;
            border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="page-wrap">

    <header>
        <div class="header-icon">📊</div>
        <div>
            <h1>擔保品 ETF 損益追蹤器</h1>
            <p>台股 ETF · 證交所 + Yahoo Finance · 自動計算損益</p>
        </div>
    </header>

    <div class="summary-grid">
        <div class="card"><div class="card-label">總投入成本</div><div class="card-value" id="sum-cost">—</div></div>
        <div class="card"><div class="card-label">目前總市值</div><div class="card-value" id="sum-value">—</div></div>
        <div class="card"><div class="card-label">損益金額</div><div class="card-value" id="sum-pl">—</div></div>
        <div class="card"><div class="card-label">整體報酬率</div><div class="card-value" id="sum-roi">—</div></div>
    </div>

    <div class="panel">
        <div class="panel-header"><span class="dot"></span>持倉明細</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="text-align:left;">ETF</th>
                        <th>持有股數</th>
                        <th>總投入成本 (元)</th>
                        <th>平均成本 (元)</th>
                        <th>今日收盤價 (元)</th>
                        <th>目前市值 (元)</th>
                        <th>損益金額 (元)</th>
                        <th>報酬率 (%)</th>
                    </tr>
                </thead>
                <tbody id="etf-body"></tbody>
                <tfoot>
                    <tr>
                        <td>合計</td><td></td>
                        <td id="ft-cost">—</td><td></td><td></td>
                        <td id="ft-value">—</td>
                        <td id="ft-pl">—</td>
                        <td id="ft-roi">—</td>
                    </tr>
                </tfoot>
            </table>
        </div>
        <div class="action-bar">
            <button class="btn btn-primary" id="btn-fetch" onclick="fetchPrices()">
                <span id="fetch-icon">🔄</span> 抓取今日收盤價
            </button>
            <button class="btn btn-secondary" onclick="calculateAll()">
                💾 重新計算 / 儲存
            </button>
            <div class="status-badge">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-msg">輸入持股資料後點擊抓取。</span>
            </div>
        </div>
    </div>

</div>
<script>
// ── ETF 清單 ─────────────────────────────────────────────────
// source: 'twse' → 從證交所批次抓
// source: 'yahoo' → 從 Yahoo Finance 單獨抓（適用上櫃 ETF）
// yahooSymbol: Yahoo Finance 代號格式（上市 .TW，上櫃 .TWO）
const ETF_LIST = [
    { code: '00713', name: '元大台灣高息低波', source: 'twse',  yahooSymbol: '00713.TW'  },
    { code: '00858', name: '永豐美國500大',    source: 'yahoo', yahooSymbol: '00858.TWO' },
    { code: '00927', name: '群益半導體收益',   source: 'twse',  yahooSymbol: '00927.TW'  },
];

const TWSE_URL = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL';

function makeProxies(url) {
    return [
        url,
        `https://corsproxy.io/?${encodeURIComponent(url)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    ];
}

// ── 從 Yahoo Finance v8 API 抓單支股票收盤價 ─────────────────
async function fetchYahooPrice(symbol) {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
    const proxies = makeProxies(url);
    for (const proxy of proxies) {
        try {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 10000);
            const res = await fetch(proxy, { signal: ctrl.signal });
            clearTimeout(timer);
            if (!res.ok) continue;
            const json = await res.json();
            // 路徑：result[0].meta.regularMarketPrice
            const price = json?.chart?.result?.[0]?.meta?.regularMarketPrice;
            if (price != null) return String(price);
        } catch (e) {
            console.warn('Yahoo 失敗：', proxy, e.message);
        }
    }
    return null;
}

// ── 從 TWSE 批次抓多支 ───────────────────────────────────────
async function fetchWithFallback(url) {
    for (const proxy of makeProxies(url)) {
        try {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 10000);
            const res = await fetch(proxy, { signal: ctrl.signal });
            clearTimeout(timer);
            if (!res.ok) continue;
            const json = await res.json();
            if (Array.isArray(json) && json.length > 0) return json;
        } catch (e) {
            console.warn('TWSE 代理失敗：', proxy, e.message);
        }
    }
    return null;
}

// ── 主要抓取流程 ─────────────────────────────────────────────
async function fetchPrices() {
    const btn   = document.getElementById('btn-fetch');
    const icon  = document.getElementById('fetch-icon');
    const dot   = document.getElementById('status-dot');
    const msgEl = document.getElementById('status-msg');

    btn.disabled = true;
    icon.innerHTML = '<span class="spinner"></span>';
    dot.className  = 'status-dot loading';
    msgEl.textContent = '正在查詢行情，請稍候…';

    // 分出兩種來源的 ETF
    const twseEtfs  = ETF_LIST.filter(e => e.source === 'twse');
    const yahooEtfs = ETF_LIST.filter(e => e.source === 'yahoo');

    // 同時發出：TWSE 批次 + 每支 Yahoo 各一個請求
    const [twseData, ...yahooPrices] = await Promise.all([
        fetchWithFallback(TWSE_URL),
        ...yahooEtfs.map(e => fetchYahooPrice(e.yahooSymbol)),
    ]);

    btn.disabled = false;
    icon.textContent = '🔄';

    // 填入 TWSE 價格
    let found = 0;
    if (twseData) {
        twseData.forEach(stock => {
            const match = twseEtfs.find(e => e.code === stock.Code);
            if (match) {
                const price = stock.ClosingPrice;
                if (price && price !== '--') {
                    document.getElementById(`price-${match.code}`).value = price;
                    found++;
                }
            }
        });
    }

    // 填入 Yahoo 價格
    yahooEtfs.forEach((etf, i) => {
        const price = yahooPrices[i];
        if (price) {
            document.getElementById(`price-${etf.code}`).value = parseFloat(price).toFixed(2);
            found++;
        }
    });

    const now = new Date().toLocaleTimeString('zh-TW');
    const twseOk  = twseData ? '證交所✓' : '證交所✗';
    const yahooOk = yahooPrices.every(p => p != null) ? 'Yahoo✓'
                  : yahooPrices.some(p => p != null)  ? 'Yahoo⚠'
                  : 'Yahoo✗';

    if (found === ETF_LIST.length) {
        dot.className = 'status-dot ok';
        msgEl.textContent = `✅ ${now} 全部更新（${twseOk} ${yahooOk}）`;
    } else if (found > 0) {
        dot.className = 'status-dot partial';
        msgEl.textContent = `⚠️ ${now} 部分更新 ${found}/${ETF_LIST.length} 檔（${twseOk} ${yahooOk}）`;
    } else {
        dot.className = 'status-dot error';
        msgEl.textContent = `❌ 抓取失敗，請手動輸入收盤價。`;
        return;
    }

    calculateAll();
}

// ── 建立表格 ─────────────────────────────────────────────────
function renderTable() {
    const tbody = document.getElementById('etf-body');
    tbody.innerHTML = '';
    ETF_LIST.forEach(({ code, name, source }) => {
        const srcLabel = source === 'yahoo' ? '櫃買中心' : '證交所';
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>
                <div class="etf-code">${code}</div>
                <div class="etf-name">${name}</div>
                <div class="etf-src">${srcLabel}</div>
            </td>
            <td><input type="number" id="shares-${code}" placeholder="股數"  min="0" oninput="calculateAll()"></td>
            <td><input type="number" id="cost-${code}"   placeholder="總成本" min="0" oninput="calculateAll()"></td>
            <td id="avg-${code}"   class="mono neutral-cell">—</td>
            <td><input type="number" id="price-${code}"  placeholder="可手填" step="0.01" min="0" oninput="calculateAll()"></td>
            <td id="value-${code}" class="mono">—</td>
            <td id="pl-${code}"    class="mono neutral-cell">—</td>
            <td id="roi-${code}"   class="mono neutral-cell">—</td>
        `;
        tbody.appendChild(tr);
    });
}

function loadData() {
    ETF_LIST.forEach(({ code }) => {
        ['shares','cost','price'].forEach(f => {
            const v = localStorage.getItem(`${f}-${code}`);
            if (v) document.getElementById(`${f}-${code}`).value = v;
        });
    });
}

function fmt(n) { return n.toLocaleString('zh-TW', { maximumFractionDigits: 0 }); }

function applyPL(elPL, elROI, pl, hasData) {
    if (!hasData) {
        elPL.textContent = '—'; elROI.textContent = '—';
        elPL.className = 'mono neutral-cell'; elROI.className = 'mono neutral-cell';
        return;
    }
    const cls = pl > 0 ? 'profit-cell' : pl < 0 ? 'loss-cell' : 'neutral-cell';
    elPL.className = `mono ${cls}`; elROI.className = `mono ${cls}`;
}

function calculateAll() {
    let sumCost = 0, sumValue = 0;
    ETF_LIST.forEach(({ code }) => {
        const shares = parseFloat(document.getElementById(`shares-${code}`).value) || 0;
        const cost   = parseFloat(document.getElementById(`cost-${code}`).value)   || 0;
        const price  = parseFloat(document.getElementById(`price-${code}`).value)  || 0;

        ['shares','cost','price'].forEach(f =>
            localStorage.setItem(`${f}-${code}`, document.getElementById(`${f}-${code}`).value)
        );

        document.getElementById(`avg-${code}`).textContent =
            (shares > 0 && cost > 0) ? (cost / shares).toFixed(2) : '—';

        const totalValue = shares * price;
        const pl  = totalValue - cost;
        const roi = cost > 0 ? (pl / cost) * 100 : 0;
        const hasData = cost > 0 && totalValue > 0;

        document.getElementById(`value-${code}`).textContent = totalValue > 0 ? fmt(totalValue) : '—';
        const plEl  = document.getElementById(`pl-${code}`);
        const roiEl = document.getElementById(`roi-${code}`);
        if (hasData) { plEl.textContent = fmt(pl); roiEl.textContent = roi.toFixed(2) + ' %'; }
        applyPL(plEl, roiEl, pl, hasData);

        sumCost  += cost;
        sumValue += totalValue;
    });

    const totalPL  = sumValue - sumCost;
    const totalROI = sumCost > 0 ? (totalPL / sumCost) * 100 : 0;
    const hasTotal = sumCost > 0 && sumValue > 0;

    document.getElementById('sum-cost').textContent  = sumCost  > 0 ? fmt(sumCost)  : '—';
    document.getElementById('sum-value').textContent = sumValue > 0 ? fmt(sumValue) : '—';

    ['sum-pl','sum-roi'].forEach(id => {
        document.getElementById(id).textContent = '—';
        document.getElementById(id).className = 'card-value';
    });
    if (hasTotal) {
        const plCard  = document.getElementById('sum-pl');
        const roiCard = document.getElementById('sum-roi');
        plCard.textContent  = fmt(totalPL);
        roiCard.textContent = totalROI.toFixed(2) + ' %';
        const cls = totalPL > 0 ? 'profit' : totalPL < 0 ? 'loss' : '';
        plCard.className  = `card-value ${cls}`;
        roiCard.className = `card-value ${cls}`;
    }

    document.getElementById('ft-cost').textContent  = sumCost  > 0 ? fmt(sumCost)  : '—';
    document.getElementById('ft-value').textContent = sumValue > 0 ? fmt(sumValue) : '—';
    const ftPL  = document.getElementById('ft-pl');
    const ftROI = document.getElementById('ft-roi');
    if (hasTotal) {
        ftPL.textContent  = fmt(totalPL);
        ftROI.textContent = totalROI.toFixed(2) + ' %';
        const cls = totalPL > 0 ? 'profit-cell' : totalPL < 0 ? 'loss-cell' : '';
        ftPL.className = cls; ftROI.className = cls;
    } else {
        ftPL.textContent = '—'; ftROI.textContent = '—';
        ftPL.className = ''; ftROI.className = '';
    }
}

window.onload = () => { renderTable(); loadData(); calculateAll(); };
</script>
</body>
</html>
